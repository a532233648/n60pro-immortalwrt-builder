name: Build Netcore N60 Pro ImmortalWrt

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-netcore-n60-pro
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: n60pro.config
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build N60 Pro
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

          df -h

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            ack \
            antlr3 \
            asciidoc \
            autoconf \
            automake \
            autopoint \
            binutils \
            bison \
            build-essential \
            bzip2 \
            ccache \
            clang \
            cmake \
            cpio \
            curl \
            device-tree-compiler \
            fastjar \
            flex \
            gawk \
            gettext \
            gcc-multilib \
            g++-multilib \
            git \
            gperf \
            haveged \
            help2man \
            intltool \
            lib32gcc-s1 \
            libc6-dev-i386 \
            libelf-dev \
            libglib2.0-dev \
            libgmp3-dev \
            libltdl-dev \
            libmpc-dev \
            libmpfr-dev \
            libncurses-dev \
            libpython3-dev \
            libreadline-dev \
            libssl-dev \
            libtool \
            libyaml-dev \
            lld \
            llvm \
            mkisofs \
            ninja-build \
            p7zip \
            p7zip-full \
            patch \
            pkgconf \
            python3 \
            python3-docutils \
            python3-pip \
            python3-ply \
            python3-pyelftools \
            python3-setuptools \
            qemu-utils \
            re2c \
            rsync \
            scons \
            squashfs-tools \
            subversion \
            swig \
            texinfo \
            uglifyjs \
            unzip \
            wget \
            xmlto \
            xxd \
            zlib1g-dev \
            zstd

          sudo apt-get clean

      - name: Clone ImmortalWrt
        run: |
          git clone \
            --depth 1 \
            --single-branch \
            --branch "${REPO_BRANCH}" \
            "${REPO_URL}" \
            openwrt

          git -C openwrt log -1 --oneline

      - name: Run diy-part1.sh
        working-directory: openwrt
        run: |
          bash "$GITHUB_WORKSPACE/diy-part1.sh"

      - name: Update and install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Run diy-part2.sh
        working-directory: openwrt
        run: |
          bash "$GITHUB_WORKSPACE/diy-part2.sh"

      - name: Load build configuration
        working-directory: openwrt
        run: |
          cp "$GITHUB_WORKSPACE/${CONFIG_FILE}" .config

          make defconfig

          echo "Target configuration:"

          grep -E \
            '^CONFIG_TARGET_mediatek|^CONFIG_TARGET_MULTI_PROFILE|netcore_n60-pro' \
            .config

          if ! grep -qx \
            'CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_netcore_n60-pro=y' \
            .config; then
            echo "Netcore N60 Pro target is not selected."
            exit 1
          fi

          echo "Check required packages:"

          for package in \
            luci-app-openclash \
            luci-app-zerotier \
            luci-app-nlbwmon \
            luci-app-wol \
            luci-app-cloudflared
          do
            if ! grep -qx "CONFIG_PACKAGE_${package}=y" .config; then
              echo "Package is not selected: ${package}"
              exit 1
            fi

            echo "Selected: ${package}"
          done

      - name: Restore download cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: immortalwrt-dl-${{ env.REPO_BRANCH }}-${{ hashFiles('n60pro.config', 'diy-part1.sh') }}
          restore-keys: |
            immortalwrt-dl-${{ env.REPO_BRANCH }}-
            immortalwrt-dl-

      - name: Download source packages
        working-directory: openwrt
        run: |
          make download -j8 || make download -j1 V=s

          find dl -type f -size -1024c -print -delete

      - name: Compile firmware
        working-directory: openwrt
        run: |
          make -j"$(nproc)" || make -j1 V=s

      - name: Prepare release information
        run: |
          BUILD_DATE="$(TZ=Asia/Shanghai date +%Y-%m-%d)"
          FILE_DATE="$(TZ=Asia/Shanghai date +%Y%m%d)"

          SOURCE_REVISION="$(cd openwrt && ./scripts/getver.sh)"
          SOURCE_COMMIT="$(git -C openwrt rev-parse --short=8 HEAD)"

          RELEASE_TAG="v25.12-${FILE_DATE}-b${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          RELEASE_TITLE="Netcore N60 Pro ImmortalWrt 25.12 - ${BUILD_DATE} - Build ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          FILE_PREFIX="Netcore-N60-Pro-ImmortalWrt-25.12-${FILE_DATE}"

          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_ENV"
          echo "SOURCE_REVISION=${SOURCE_REVISION}" >> "$GITHUB_ENV"
          echo "SOURCE_COMMIT=${SOURCE_COMMIT}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_TITLE=${RELEASE_TITLE}" >> "$GITHUB_ENV"
          echo "FILE_PREFIX=${FILE_PREFIX}" >> "$GITHUB_ENV"

      - name: Collect and rename firmware
        run: |
          TARGET_DIR="openwrt/bin/targets/mediatek/filogic"

          mkdir -p firmware

          shopt -s nullglob

          files=("$TARGET_DIR"/*netcore_n60-pro*)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Netcore N60 Pro firmware files were generated."
            exit 1
          fi

          for file in "${files[@]}"; do
            base="$(basename "$file")"
            extension="${base##*.}"

            case "$base" in
              *squashfs-sysupgrade*)
                cp "$file" \
                  "firmware/${FILE_PREFIX}-sysupgrade.${extension}"
                ;;

              *initramfs-recovery*)
                cp "$file" \
                  "firmware/${FILE_PREFIX}-recovery.${extension}"
                ;;

              *bl31-uboot*)
                cp "$file" \
                  "firmware/${FILE_PREFIX}-uboot.${extension}"
                ;;

              *preloader*)
                cp "$file" \
                  "firmware/${FILE_PREFIX}-preloader.${extension}"
                ;;
            esac
          done

          if [ -f "$TARGET_DIR/config.buildinfo" ]; then
            cp "$TARGET_DIR/config.buildinfo" \
              "firmware/${FILE_PREFIX}-config.buildinfo"
          fi

          if [ -f "$TARGET_DIR/feeds.buildinfo" ]; then
            cp "$TARGET_DIR/feeds.buildinfo" \
              "firmware/${FILE_PREFIX}-feeds.buildinfo"
          fi

          if [ -f "$TARGET_DIR/version.buildinfo" ]; then
            cp "$TARGET_DIR/version.buildinfo" \
              "firmware/${FILE_PREFIX}-version.buildinfo"
          fi

          manifest=("$TARGET_DIR"/*.manifest)

          if [ "${#manifest[@]}" -gt 0 ]; then
            cp "${manifest[0]}" \
              "firmware/${FILE_PREFIX}-packages.manifest"
          fi

          cat > "firmware/${FILE_PREFIX}-build-info.txt" <<INFO
          Device: Netcore N60 Pro
          Firmware: ImmortalWrt 25.12
          Build date: ${BUILD_DATE}
          Source revision: ${SOURCE_REVISION}
          Source commit: ${SOURCE_COMMIT}
          GitHub build: ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}
          Default IP: 192.168.10.1
          Included: OpenClash, ZeroTier, Wake-on-LAN, nlbwmon, Cloudflare Tunnel
          INFO

          (
            cd firmware
            sha256sum * > "${FILE_PREFIX}-sha256sums.txt"
          )

          echo "Firmware files:"

          ls -lh firmware

          if ! find firmware \
            -type f \
            -name '*-sysupgrade.*' \
            | grep -q .; then
            echo "Sysupgrade firmware was not generated."
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OPENCLASH_VERSION="$(
            sed -n 's/^PKG_VERSION:=//p' \
            openwrt/package/luci-app-openclash/Makefile \
            | head -n1
          )"

          ZEROTIER_VERSION="$(
            sed -n 's/^PKG_VERSION:=//p' \
            openwrt/feeds/packages/net/zerotier/Makefile \
            | head -n1
          )"

          CLOUDFLARED_VERSION="$(
            sed -n 's/^PKG_VERSION:=//p' \
            openwrt/feeds/packages/net/cloudflared/Makefile \
            | head -n1
          )"

          cat > release-notes.md <<NOTES
          ## Netcore N60 Pro ImmortalWrt

          - 固件版本：ImmortalWrt 25.12
          - 编译日期：${BUILD_DATE}
          - 源码版本：${SOURCE_REVISION}
          - 源码提交：${SOURCE_COMMIT}
          - OpenClash：${OPENCLASH_VERSION}
          - ZeroTier：${ZEROTIER_VERSION}
          - Cloudflared：${CLOUDFLARED_VERSION}
          - 默认管理地址：192.168.10.1

          ### 已集成功能

          - OpenClash
          - ZeroTier
          - 网络唤醒
          - nlbwmon 流量统计
          - Cloudflare Tunnel

          日常升级请下载文件名包含 sysupgrade 的固件。
          NOTES

          gh release create "$RELEASE_TAG" \
            firmware/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes-file release-notes.md \
            --latest
