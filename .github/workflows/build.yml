name: Build Netcore N60 Pro ImmortalWrt

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-netcore-n60-pro
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: n60pro.config
  DIY_PART1: diy-part1.sh
  DIY_PART2: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build N60 Pro
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

          echo "Disk space:"
          df -h

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            ack \
            antlr3 \
            asciidoc \
            autoconf \
            automake \
            autopoint \
            binutils \
            bison \
            build-essential \
            bzip2 \
            ccache \
            clang \
            cmake \
            cpio \
            curl \
            device-tree-compiler \
            fastjar \
            flex \
            gawk \
            gettext \
            gcc-multilib \
            g++-multilib \
            git \
            gperf \
            haveged \
            help2man \
            intltool \
            lib32gcc-s1 \
            libc6-dev-i386 \
            libelf-dev \
            libglib2.0-dev \
            libgmp3-dev \
            libltdl-dev \
            libmpc-dev \
            libmpfr-dev \
            libncurses-dev \
            libpython3-dev \
            libreadline-dev \
            libssl-dev \
            libtool \
            libyaml-dev \
            lld \
            llvm \
            mkisofs \
            ninja-build \
            p7zip \
            p7zip-full \
            patch \
            pkgconf \
            python3 \
            python3-docutils \
            python3-pip \
            python3-ply \
            python3-pyelftools \
            python3-setuptools \
            qemu-utils \
            re2c \
            rsync \
            scons \
            squashfs-tools \
            subversion \
            swig \
            texinfo \
            uglifyjs \
            unzip \
            wget \
            xmlto \
            xxd \
            zlib1g-dev \
            zstd

          sudo apt-get clean

      - name: Clone ImmortalWrt
        run: |
          git clone \
            --depth 1 \
            --single-branch \
            --branch "${REPO_BRANCH}" \
            "${REPO_URL}" \
            openwrt

          cd openwrt

          echo "Source branch:"
          git branch --show-current

          echo "Source commit:"
          git log -1 --oneline

      - name: Run diy-part1.sh
        working-directory: openwrt
        run: |
          bash "$GITHUB_WORKSPACE/${DIY_PART1}"

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a

      - name: Install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds install -a

      - name: Run diy-part2.sh
        working-directory: openwrt
        run: |
          bash "$GITHUB_WORKSPACE/${DIY_PART2}"

      - name: Load build configuration
        working-directory: openwrt
        run: |
          cp "$GITHUB_WORKSPACE/${CONFIG_FILE}" .config

          make defconfig

          echo "Selected target:"
          grep -E \
            '^CONFIG_TARGET_|DEVICE_netcore_n60-pro|CONFIG_PACKAGE_luci|CONFIG_LUCI_LANG' \
            .config | head -n 100

          if ! grep -q \
            '^CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_netcore_n60-pro=y' \
            .config; then
            echo "Netcore N60 Pro target is not selected."
            exit 1
          fi

      - name: Restore download cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: immortalwrt-dl-${{ env.REPO_BRANCH }}-${{ hashFiles('n60pro.config', 'diy-part1.sh') }}
          restore-keys: |
            immortalwrt-dl-${{ env.REPO_BRANCH }}-
            immortalwrt-dl-

      - name: Download source packages
        working-directory: openwrt
        run: |
          make download -j8 || make download -j1 V=s

          echo "Remove incomplete download files:"
          find dl -type f -size -1024c -print -delete

      - name: Compile firmware
        working-directory: openwrt
        run: |
          echo "CPU threads: $(nproc)"

          make -j"$(nproc)" || make -j1 V=s

      - name: Collect firmware
        run: |
          TARGET_DIR="openwrt/bin/targets/mediatek/filogic"

          if [ ! -d "$TARGET_DIR" ]; then
            echo "Firmware output directory was not generated."
            exit 1
          fi

          mkdir -p firmware

          find "$TARGET_DIR" \
            -maxdepth 1 \
            -type f \
            \( \
              -name '*netcore_n60-pro*' \
              -o -name 'sha256sums' \
              -o -name 'profiles.json' \
              -o -name '*.manifest' \
              -o -name 'config.buildinfo' \
              -o -name 'feeds.buildinfo' \
              -o -name 'version.buildinfo' \
            \) \
            -exec cp -v {} firmware/ \;

          echo "Firmware files:"
          ls -lh firmware

          if ! find firmware \
            -type f \
            -name '*netcore_n60-pro-squashfs-sysupgrade.*' \
            | grep -q .; then
            echo "N60 Pro sysupgrade firmware was not generated."
            exit 1
          fi

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: Netcore-N60-Pro-ImmortalWrt-25.12
          path: firmware/*
          if-no-files-found: error
          retention-days: 30
